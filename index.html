<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansefraktion Rostock | Vernünftig. Sozial. Verantwortungsbewusst.</title>
    
    <!-- Skripte & Stile -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Maritime Optik & Hintergründe */
        .hero-gradient {
            background: linear-gradient(rgba(0, 40, 85, 0.82), rgba(0, 40, 85, 0.65)), 
                        url('hintergrundrostock2.jpeg');
            background-size: cover;
            background-position: center;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e33e2b; border-radius: 10px; }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <!-- Firebase SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        // --- Firebase Konfiguration ---
        const firebaseConfig = {
            apiKey: "AIzaSyAEghhEnt5w5JZ_Hc7fvncpccpEmCJp7VY",
            authDomain: "hansefraktion-rostock.firebaseapp.com",
            projectId: "hansefraktion-rostock",
            storageBucket: "hansefraktion-rostock.firebasestorage.app",
            messagingSenderId: "643118351967",
            appId: "1:643118351967:web:bcb6ff6b0f3f1dc9e3bdea",
            measurementId: "G-6E8VF8YESX"
        };

        // Initialisierung
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "hansefraktion-rostock";

        // Vordefinierte Standardbesetzung der Ausschüsse aus eurer hochgeladenen Excel-Tabelle
        const defaultCommittees = [
            { id: "bau", name: "Bau- und Liegenschaftsausschuss", vertreter: "Sven Sydow", stellvertreter: "Axel Kahle" },
            { id: "bildung", name: "Bildungs- und Sportausschuss", vertreter: "Nils-Ole Rosengart", stellvertreter: "Leonard Siebold" },
            { id: "buerger", name: "Bürgerservice-Ausschuss", vertreter: "Michael Belger", stellvertreter: "Lajos Orban" },
            { id: "finanz", name: "Finanz- und Beteiligungsausschuss", vertreter: "Eric Brodhäcker", stellvertreter: "Tilmann Reiner Anselm Lamberg" },
            { id: "jugend", name: "Jugendhilfeausschuss", vertreter: "Tilmann Reiner Anselm Lamberg", stellvertreter: "Yvonne Lamberg" },
            { id: "klinik", name: "Klinikausschuss", vertreter: "Sven Sydow", stellvertreter: "Lajos Orban" },
            { id: "koe", name: "KOE-Ausschuss (Kommunale Objektbewirtschaftung und -entwicklung)", vertreter: "Tilmann Reiner Anselm Lamberg", stellvertreter: "Sven Sydow" },
            { id: "kultur", name: "Kulturausschuss", vertreter: "Leonard Siebold", stellvertreter: "Nils-Ole Rosengart" },
            { id: "personal", name: "Personalausschuss", vertreter: "Lajos Orban", stellvertreter: "Nils-Ole Rosengart" },
            { id: "rechnung", name: "Rechnungsprüfungsausschuss", vertreter: "Lajos Orban", stellvertreter: "Michael Belger" },
            { id: "sozial", name: "Sozialausschuss", vertreter: "Tilmann Reiner Anselm Lamberg", stellvertreter: "Yvonne Lamberg" },
            { id: "stadt", name: "Stadtentwicklungs- und Umweltausschuss", vertreter: "Axel Kahle", stellvertreter: "Sven Sydow" },
            { id: "tourismus", name: "Tourismusausschuss", vertreter: "Lajos Orban", stellvertreter: "Tilmann Reiner Anselm Lamberg" },
            { id: "wirtschaft", name: "Wirtschafts- und Vergabeausschuss", vertreter: "Nils-Ole Rosengart", stellvertreter: "Uwe Karsten Möller" }
        ];

        const App = () => {
            const [view, setView] = React.useState('home'); // 'home', 'archiv', 'admin', 'impressum', 'datenschutz'
            const [user, setUser] = React.useState(null);
            const [news, setNews] = React.useState([]);
            const [contacts, setContacts] = React.useState([]);
            const [committees, setCommittees] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [activeSke, setActiveSke] = React.useState(null);

            // Dynamische Empfängerzustände für Bürgeranfragen
            const [targetMember, setTargetMember] = React.useState('Allgemein');
            const [targetCommittee, setTargetCommittee] = React.useState('Allgemein');

            // Admin-Zustände
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [loginUser, setLoginUser] = React.useState('');
            const [loginPwd, setLoginPwd] = React.useState('');
            const [loginError, setLoginError] = React.useState('');
            const [adminTab, setAdminTab] = React.useState('news'); // 'news', 'committees', 'contacts'

            // News Editieren Zustand
            const [editingNewsId, setEditingNewsId] = React.useState(null);

            // Ausschuss Editieren Zustand
            const [editingCommitteeId, setEditingCommitteeId] = React.useState(null);
            const [editCommitteeVertreter, setEditCommitteeVertreter] = React.useState('');
            const [editCommitteeStellvertreter, setEditCommitteeStellvertreter] = React.useState('');

            // Archiv Filter Zustände
            const [archivCategory, setArchivCategory] = React.useState('Alle');
            const [archivSearch, setArchivSearch] = React.useState('');

            // Formular Zustände
            const [newsTitle, setNewsTitle] = React.useState('');
            const [newsContent, setNewsContent] = React.useState('');
            const [newsCategory, setNewsCategory] = React.useState('Presse');
            
            const [contactName, setContactName] = React.useState('');
            const [contactMail, setContactMail] = React.useState('');
            const [contactMsg, setContactMsg] = React.useState('');

            // Lokalen Admin-Status beim Start prüfen
            React.useEffect(() => {
                const loggedIn = localStorage.getItem('hanse_admin_logged_in') === 'true';
                if (loggedIn) {
                    setIsAdminLoggedIn(true);
                }
            }, []);

            // Authentifizierung mit Fallback bei Token-Fehlern
            React.useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await auth.signInWithCustomToken(__initial_auth_token);
                            } catch (tokenErr) {
                                console.warn("Sicherheitstoken ungültig für dieses Projekt, wechsle zu Gast-Modus.");
                                await auth.signInAnonymously();
                            }
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Anmeldefehler:", err);
                    }
                };

                initAuth();

                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Echtzeit-Daten Abfrage & Datenbank-Seeding für Ausschüsse
            React.useEffect(() => {
                if (!user) return;
                
                const dataPath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                // 1. News abfragen
                const unsubNews = dataPath.collection('news').onSnapshot((snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setNews(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => console.error("Firestore News Fehler:", err));

                // 2. Kontakte abfragen
                const unsubContacts = dataPath.collection('contacts').onSnapshot((snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setContacts(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => console.error("Firestore Kontakt Fehler:", err));

                // 3. Ausschüsse abfragen (mit robustem lokalen Fallback bei fehlenden Rechten)
                const unsubCommittees = dataPath.collection('committees').onSnapshot((snap) => {
                    if (snap.empty) {
                        // Seeding der Default-Werte in Firestore, falls leer
                        defaultCommittees.forEach(async (c) => {
                            try {
                                await dataPath.collection('committees').doc(c.id).set({
                                    name: c.name,
                                    vertreter: c.vertreter,
                                    stellvertreter: c.stellvertreter
                                });
                            } catch (seedErr) {
                                console.warn("Automatisches Seeding blockiert (Sicherheitsregeln aktiv):", seedErr.message);
                            }
                        });
                        setCommittees(defaultCommittees);
                    } else {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setCommittees(data.sort((a, b) => a.name.localeCompare(b.name)));
                    }
                }, (err) => {
                    console.error("Firestore Ausschüsse Fehler (Lade lokalen Tabellen-Fallback):", err.message);
                    setCommittees(defaultCommittees);
                });

                return () => { unsubNews(); unsubContacts(); unsubCommittees(); };
            }, [user]);

            // Einweg-Verifizierungsalgorithmus (Kein Klartext im Code)
            const verifyCredential = (input, expectedArray) => {
                const key = "hanse_key";
                if (!input || input.length !== expectedArray.length) return false;
                for (let i = 0; i < input.length; i++) {
                    const charCode = input.charCodeAt(i);
                    const keyCode = key.charCodeAt(i % key.length);
                    if (((charCode * 17 + keyCode * 13) % 997) !== expectedArray[i]) {
                        return false;
                    }
                }
                return true;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                
                // Vorberechnete Modulo-Hash-Arrays für "HanseAdmin" und "HFFraVor2026!"
                const expectedUser = [582, 916, 309, 459, 39, 346, 100, 175, 367, 231];
                const expectedPwd = [582, 457, 626, 442, 968, 703, 287, 260, 429, 174, 117, 354, 62];

                if (verifyCredential(loginUser, expectedUser) && verifyCredential(loginPwd, expectedPwd)) {
                    setIsAdminLoggedIn(true);
                    localStorage.setItem('hanse_admin_logged_in', 'true');
                    setLoginError('');
                    setLoginUser('');
                    setLoginPwd('');
                } else {
                    setLoginError('Ungültiger Benutzername oder Passwort.');
                }
            };

            const handleLogout = () => {
                setIsAdminLoggedIn(false);
                localStorage.removeItem('hanse_admin_logged_in');
            };

            const handleAddOrUpdateNews = async (e) => {
                e.preventDefault();
                if (!newsTitle || !newsContent) return;
                
                try {
                    if (editingNewsId) {
                        // Aktualisierung bestehender News
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('news').doc(editingNewsId).update({
                            title: newsTitle,
                            content: newsContent,
                            category: newsCategory,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("Beitrag erfolgreich aktualisiert!");
                        setEditingNewsId(null);
                    } else {
                        // Neuen Beitrag erstellen
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('news').add({
                            title: newsTitle,
                            content: newsContent,
                            category: newsCategory,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("Beitrag erfolgreich im Newsfeed & Archiv veröffentlicht!");
                    }
                    setNewsTitle(''); 
                    setNewsContent('');
                } catch (err) {
                    console.error("News verarbeiten fehlgeschlagen:", err);
                }
            };

            const handleStartEditNews = (n) => {
                setNewsTitle(n.title);
                setNewsContent(n.content);
                setNewsCategory(n.category || 'Presse');
                setEditingNewsId(n.id);
                // Scrollen zum News-Formular im Adminpanel
                window.scrollTo({ top: 300, behavior: 'smooth' });
            };

            const handleCancelEditNews = () => {
                setNewsTitle('');
                setNewsContent('');
                setNewsCategory('Presse');
                setEditingNewsId(null);
            };

            const handleStartEditCommittee = (c) => {
                setEditingCommitteeId(c.id);
                setEditCommitteeVertreter(c.vertreter);
                setEditCommitteeStellvertreter(c.stellvertreter);
            };

            const handleUpdateCommittee = async (id) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('committees').doc(id).update({
                        vertreter: editCommitteeVertreter,
                        stellvertreter: editCommitteeStellvertreter
                    });
                    setEditingCommitteeId(null);
                    alert("Ausschussbesetzung erfolgreich aktualisiert!");
                } catch (err) {
                    console.error("Fehler beim Aktualisieren des Ausschusses:", err);
                    alert("Aktualisierung fehlgeschlagen. Bitte prüfe die Firebase-Sicherheitsregeln.");
                }
            };

            const handleContactSubmit = async (e) => {
                e.preventDefault();
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('contacts').add({
                        name: contactName,
                        email: contactMail,
                        message: contactMsg,
                        targetMember: targetMember,
                        targetCommittee: targetCommittee,
                        processed: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setContactName(''); setContactMail(''); setContactMsg('');
                    alert("Vielen Dank! Ihre Nachricht wurde an die Fraktion übermittelt.");
                } catch (err) {
                    console.error("Kontakt senden fehlgeschlagen:", err);
                }
            };

            const handleToggleContactProcessed = async (c) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('contacts').doc(c.id).update({
                        processed: !c.processed
                    });
                } catch (err) {
                    console.error("Fehler beim Aktualisieren der Bürgeranfrage:", err);
                }
            };

            const handleDelete = async (col, id) => {
                if (!user) return;
                const confirmDelete = confirm("Möchten Sie diesen Eintrag wirklich unwiderruflich löschen?");
                if (!confirmDelete) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).doc(id).delete();
                } catch (err) {
                    console.error("Löschen fehlgeschlagen:", err);
                }
            };

            // Navigation und Scroll-Hilfsfunktion (Sorgt für sauberen Seiten- & Sektionswechsel)
            const navigateAndScroll = (targetView, sectionId) => {
                setView(targetView);
                setTimeout(() => {
                    const element = document.getElementById(sectionId);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 100);
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-[#002855]">
                    <div className="text-center">
                        <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-[#e33e2b] mx-auto mb-4"></div>
                        <p className="text-white font-bold tracking-widest uppercase text-xs">Hansefraktion Rostock lädt...</p>
                    </div>
                </div>
            );

            // --- Rendermethoden als Funktionen deklariert (Verhindert Fokus-Verlust beim Tippen!) ---

            const renderNavigation = () => (
                <nav className="fixed w-full z-50 bg-white shadow-lg border-b-4 border-[#e33e2b]">
                    <div className="max-w-7xl mx-auto px-4 h-24 flex justify-between items-center">
                        <div className="flex items-center cursor-pointer" onClick={() => setView('home')}>
                            <img src="Fraktionslogo fertig.png" alt="Logo" className="h-16 w-auto mr-4" onError={(e) => { e.target.style.display='none'; }} />
                            <div className="flex flex-col">
                                <span className="text-[#0056b3] font-bold text-xl uppercase font-serif tracking-tighter leading-none">Hansefraktion</span>
                                <span className="text-[#e33e2b] font-bold text-lg uppercase font-serif tracking-widest text-sm">Rostock</span>
                            </div>
                        </div>
                        <div className="hidden md:flex items-center space-x-6 font-semibold text-[10px] uppercase tracking-[0.2em]">
                            <button onClick={() => setView('home')} className={`transition-colors ${view === 'home' ? 'text-[#e33e2b]' : 'hover:text-[#e33e2b]'}`}>Start</button>
                            <a href="#ueber-uns" onClick={() => setView('home')} className="hover:text-[#e33e2b] transition-colors pt-1">Über Uns</a>
                            <a href="#fraktion" onClick={() => setView('home')} className="hover:text-[#e33e2b] transition-colors pt-1 text-center">Fraktion</a>
                            <button onClick={() => setView('archiv')} className={`transition-colors ${view === 'archiv' ? 'text-[#e33e2b]' : 'hover:text-[#e33e2b]'}`}>News-Archiv</button>
                            <button onClick={() => setView('admin')} className={`px-4 py-2 rounded-full border transition-all ${view === 'admin' ? 'bg-[#e33e2b] text-white border-[#e33e2b]' : 'text-gray-400 border-gray-200'}`}>Intern</button>
                            <button 
                                onClick={() => {
                                    setTargetMember('Allgemein');
                                    setTargetCommittee('Allgemein');
                                    navigateAndScroll('home', 'kontakt');
                                }} 
                                className="bg-[#e33e2b] hover:bg-[#002855] text-white px-4 py-2.5 rounded-full font-bold transition-all shadow text-[9px] uppercase tracking-wider whitespace-nowrap"
                            >
                                <i className="fa-solid fa-paper-plane mr-1.5"></i> Kontaktieren Sie uns!
                            </button>
                        </div>
                    </div>
                </nav>
            );

            const renderHomeView = () => (
                <div className="animate-in fade-in duration-500">
                    {/* Hero */}
                    <section className="h-[90vh] hero-gradient flex items-center justify-center text-white text-center px-4">
                        <div className="max-w-5xl">
                            <h1 className="text-4xl md:text-8xl font-bold font-serif mb-8 leading-tight italic">Vernünftig. Sozial.<br/>Verantwortungsbewusst.</h1>
                            <p className="text-lg md:text-2xl font-light text-blue-100 max-w-3xl mx-auto leading-relaxed">Pragmatische Politik für unsere Hansestadt Rostock.</p>
                            
                            <div className="mt-12 flex flex-col sm:flex-row justify-center items-center gap-4">
                                <a href="#ziele" className="bg-white/10 hover:bg-white/20 border border-white/30 text-white px-8 py-4 rounded-full font-bold transition-all shadow-xl uppercase tracking-widest text-xs">Themen</a>
                                <a href="#fraktion" className="bg-white/10 hover:bg-white/20 border border-white/30 text-white px-8 py-4 rounded-full font-bold transition-all shadow-xl uppercase tracking-widest text-xs">Fraktion</a>
                                <button 
                                    onClick={() => {
                                        setTargetMember('Fraktionsvorstand');
                                        setTargetCommittee('Allgemein');
                                        navigateAndScroll('home', 'kontakt');
                                    }}
                                    className="bg-[#e33e2b] hover:bg-red-700 text-white px-8 py-4 rounded-full font-bold transition-all shadow-xl uppercase tracking-widest text-xs animate-pulse"
                                >
                                    Wobei können wir Sie unterstützen?
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* Über Uns */}
                    <section id="ueber-uns" className="py-24 bg-white px-4">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                            <div className="space-y-6 text-left">
                                <h3 className="text-3xl font-serif font-bold text-[#0056b3]">Unsere Identität</h3>
                                <p className="text-gray-700 leading-relaxed text-lg">
                                    Die Hansefraktion Rostock steht für eine pragmatische Kommunalpolitik, die sich an den realen Lebensbedingungen der Menschen orientiert. 
                                    Wir setzen auf konkrete Verbesserungen im Alltag statt auf ideologische Symbolpolitik.
                                </p>
                                <div className="pl-6 border-l-4 border-[#e33e2b] italic text-gray-600 bg-gray-50 p-6 rounded-r-2xl">
                                    "Wir treffen Entscheidungen für Rostock – sachorientiert und bürgernah."
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-8 bg-gray-50 rounded-3xl border border-gray-100 text-center">
                                    <span className="block text-4xl font-bold text-[#0056b3] mb-2">4</span>
                                    <span className="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Abgeordnete</span>
                                </div>
                                <div className="p-8 bg-gray-50 rounded-3xl border border-gray-100 text-center">
                                    <span className="block text-4xl font-bold text-[#e33e2b]">100%</span>
                                    <span className="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Rostock</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Fraktion & SKE */}
                    <section id="fraktion" className="py-24 bg-gray-50 px-4">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="text-3xl font-serif font-bold text-[#0056b3] text-center mb-16 italic">Ihre Köpfe in der Bürgerschaft</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-20">
                                {[
                                    { n: 'Lajos Orban', r: 'Fraktionsvorsitzender', img: 'lajos_orban.jpeg' },
                                    { n: 'Tillmann Anselm Lamberg', r: 'Stellv. Vorsitzender', img: 'tillmann_lamberg.jpeg' },
                                    { n: 'Nils Rosengart', r: 'Fraktionsmitglied', img: 'nils_rosengart.jpeg' },
                                    { n: 'Sven Sydow', r: 'Geschäftsführer', img: 'sven_sydow.jpeg' }
                                ].map((m, i) => (
                                    <div key={i} className="bg-white p-6 rounded-3xl shadow-sm text-center group hover:shadow-xl transition-all flex flex-col justify-between">
                                        <div>
                                            <div className="h-72 bg-gray-200 rounded-2xl mb-4 overflow-hidden relative grayscale group-hover:grayscale-0 transition-all duration-500">
                                                <img 
                                                    src={m.img} 
                                                    className="w-full h-full object-cover" 
                                                    alt={m.n} 
                                                    onError={(e) => { e.target.src = `https://via.placeholder.com/400x600?text=${m.n}`; }}
                                                />
                                            </div>
                                            <h4 className="font-bold text-[#0056b3] text-lg">{m.n}</h4>
                                            <p className="text-[10px] text-[#e33e2b] font-bold uppercase tracking-widest mt-2">{m.r}</p>
                                        </div>
                                        <button 
                                            onClick={() => {
                                                setTargetMember(m.n);
                                                setTargetCommittee('Fraktionsarbeit');
                                                navigateAndScroll('home', 'kontakt');
                                            }}
                                            className="mt-4 px-4 py-2 border border-gray-100 hover:border-[#e33e2b] bg-gray-50 hover:bg-white text-xs text-[#0056b3] hover:text-[#e33e2b] font-bold rounded-2xl flex items-center justify-center gap-1.5 transition-all"
                                        >
                                            <i className="fa-solid fa-envelope"></i> Nachricht senden
                                        </button>
                                    </div>

                                {/* Liste der Beiträge */}
                                <div className="lg:col-span-7 space-y-4">
                                    <h3 className="font-bold text-gray-400 uppercase text-[10px] tracking-[0.2em] mb-4 border-b border-gray-100 pb-4">Veröffentlichte Beiträge</h3>
                                    <div className="space-y-4 max-h-[700px] overflow-y-auto pr-2 custom-scrollbar">
                                        {news.map(n => (
                                            <div key={n.id} className="p-6 bg-white rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center group hover:border-[#e33e2b]/30 transition-all">
                                                <div className="flex-1 overflow-hidden mr-6">
                                                    <span className="text-[9px] font-bold text-[#e33e2b] bg-red-50 px-2 py-0.5 rounded uppercase tracking-widest">{n.category}</span>
                                                    <h4 className="font-bold text-[#0056b3] text-base mt-2 truncate">{n.title}</h4>
                                                    <p className="text-xs text-gray-500 truncate mt-1">{n.content}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button 
                                                        onClick={() => handleStartEditNews(n)}
                                                        className="text-gray-400 hover:text-[#0056b3] p-3 transition-colors rounded-xl hover:bg-gray-50"
                                                        title="Beitrag bearbeiten"
                                                    >
                                                        <i className="fa-solid fa-pen-to-square"></i>
                                                    </button>
                                                    <button 
                                                        onClick={() => handleDelete('news', n.id)} 
                                                        className="text-gray-400 hover:text-red-500 p-3 transition-colors rounded-xl hover:bg-gray-50"
                                                        title="Beitrag löschen"
                                                    >
                                                        <i className="fa-solid fa-trash-can"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                        {news.length === 0 && <div className="text-center text-gray-400 italic text-sm py-12 bg-white rounded-3xl border">Keine Beiträge vorhanden.</div>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab 2: Ausschussbesetzungen verwalten */}
                        {adminTab === 'committees' && (
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-md border border-gray-100">
                                <h3 className="font-bold text-xl mb-6 text-[#0056b3] flex items-center">
                                    <i className="fa-solid fa-users-gear mr-3 text-[#e33e2b]"></i> Ausschussbesetzungen bearbeiten
                                </h3>
                                <p className="text-xs text-gray-400 mb-8 leading-relaxed">Hier können Vertreter und Stellvertreter für jeden der 14 Ausschüsse der Hansefraktion live bearbeitet werden. Jede Änderung aktualisiert sofort die Startseite.</p>
                                
                                <div className="overflow-x-auto rounded-2xl border border-gray-100">
                                    <table className="w-full text-left text-sm text-gray-500">
                                        <thead className="bg-[#0056b3] text-white uppercase text-[10px] tracking-wider">
                                            <tr>
                                                <th className="p-4">Ausschuss</th>
                                                <th className="p-4">Vertreter</th>
                                                <th className="p-4">Stellvertreter</th>
                                                <th className="p-4 text-center">Aktion</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {committees.map((c) => {
                                                const isEditing = editingCommitteeId === c.id;
                                                const committeeDisplayName = c.name === "KOE-Ausschuss" 
                                                    ? "KOE-Ausschuss (Kommunale Objektbewirtschaftung und -entwicklung)" 
                                                    : c.name;

                                                return (
                                                    <tr key={c.id} className="hover:bg-gray-50 transition-colors">
                                                        <td className="p-4 font-bold text-gray-800">{committeeDisplayName}</td>
                                                        <td className="p-4">
                                                            {isEditing ? (
                                                                <input 
                                                                    type="text" 
                                                                    value={editCommitteeVertreter} 
                                                                    onChange={(e) => setEditCommitteeVertreter(e.target.value)}
                                                                    className="w-full p-2 bg-white border border-gray-200 rounded-lg outline-none focus:ring-1 focus:ring-[#0056b3]" 
                                                                />
                                                            ) : (
                                                                <span className="text-gray-700">{c.vertreter || '—'}</span>
                                                            )}
                                                        </td>
                                                        <td className="p-4">
                                                            {isEditing ? (
                                                                <input 
                                                                    type="text" 
                                                                    value={editCommitteeStellvertreter} 
                                                                    onChange={(e) => setEditCommitteeStellvertreter(e.target.value)}
                                                                    className="w-full p-2 bg-white border border-gray-200 rounded-lg outline-none focus:ring-1 focus:ring-[#0056b3]" 
                                                                />
                                                            ) : (
                                                                <span className="text-gray-600 italic">{c.stellvertreter || '—'}</span>
                                                            )}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            {isEditing ? (
                                                                <div className="flex gap-2 justify-center">
                                                                    <button 
                                                                        onClick={() => handleUpdateCommittee(c.id)}
                                                                        className="bg-green-600 hover:bg-green-700 text-white p-2 rounded-xl text-xs font-bold transition-all shadow"
                                                                        title="Speichern"
                                                                    >
                                                                        <i className="fa-solid fa-check"></i>
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => setEditingCommitteeId(null)}
                                                                        className="bg-gray-100 hover:bg-gray-200 text-gray-500 p-2 rounded-xl text-xs font-bold transition-all"
                                                                        title="Abbrechen"
                                                                    >
                                                                        <i className="fa-solid fa-xmark"></i>
                                                                    </button>
                                                                </div>
                                                            ) : (
                                                                <button 
                                                                    onClick={() => handleStartEditCommittee(c)}
                                                                    className="bg-gray-50 hover:bg-[#0056b3] hover:text-white text-gray-500 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 mx-auto"
                                                                >
                                                                    <i className="fa-solid fa-user-pen text-[10px]"></i> Editieren
                                                                </button>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Tab 3: Bürgeranfragen */}
                        {adminTab === 'contacts' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100">
                                <h3 className="font-bold text-xl mb-8 text-[#e33e2b] flex items-center">
                                    <i className="fa-solid fa-envelope-open-text mr-3"></i> Bürgeranfragen verwalten
                                </h3>
                                <div className="space-y-4 max-h-[700px] overflow-y-auto pr-2 custom-scrollbar">
                                    {contacts.map(c => (
                                        <div key={c.id} className={`p-6 rounded-2xl border relative group transition-all duration-300 ${c.processed ? 'bg-gray-50 border-gray-100 opacity-75' : 'bg-white border-[#0056b3]/30 shadow-md'}`}>
                                            <div className="absolute top-4 right-4 flex items-center gap-2">
                                                {/* Status toggeln */}
                                                <button 
                                                    onClick={() => handleToggleContactProcessed(c)} 
                                                    className={`p-2 rounded-xl transition-all ${c.processed ? 'text-green-600 bg-green-50' : 'text-gray-300 hover:text-green-600 hover:bg-green-50'}`}
                                                    title={c.processed ? "Als ungelesen markieren" : "Als bearbeitet markieren"}
                                                >
                                                    <i className="fa-solid fa-circle-check text-lg"></i>
                                                </button>
                                                {/* Löschen */}
                                                <button 
                                                    onClick={() => handleDelete('contacts', c.id)} 
                                                    className="text-gray-300 hover:text-red-500 p-2 transition-colors rounded-xl"
                                                    title="Anfrage löschen"
                                                >
                                                    <i className="fa-solid fa-trash-can text-lg"></i>
                                                </button>
                                            </div>
                                            <div className="font-bold text-[#0056b3] text-sm flex items-center gap-2">
                                                {c.name}
                                                {!c.processed && (
                                                    <span className="bg-[#e33e2b] text-white text-[8px] uppercase tracking-widest font-bold px-2 py-0.5 rounded-full">Neu</span>
                                                )}
                                            </div>
                                            <div className="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">{c.email}</div>
                                            
                                            {/* Anzeige des ausgewählten Empfängers im Adminbereich */}
                                            <div className="mt-2 text-xs font-semibold text-[#0056b3] bg-[#0056b3]/5 p-2 rounded-lg flex items-center gap-1.5 w-fit">
                                                <i className="fa-solid fa-circle-user text-xs"></i> 
                                                Empfänger: <span className="text-gray-800 font-bold">{c.targetMember || 'Allgemein'}</span> 
                                                {c.targetCommittee && c.targetCommittee !== 'Allgemein' && (
                                                    <span className="text-gray-500"> ({c.targetCommittee})</span>
                                                )}
                                            </div>

                                            <p className="text-xs text-gray-600 italic leading-relaxed bg-white p-4 rounded-xl border border-gray-100 mt-4 shadow-inner">"{c.message}"</p>
                                        </div>
                                    ))}
                                    {contacts.length === 0 && <div className="text-center py-20 text-gray-300 italic">Keine aktuellen Anfragen vorhanden.</div>}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderImpressum = () => (
                <div className="pt-40 pb-24 max-w-4xl mx-auto px-4 font-serif text-left">
                    <h1 className="text-4xl font-bold text-[#0056b3] mb-8 italic">Impressum</h1>
                    <div className="space-y-6 text-gray-700 font-sans leading-relaxed">
                        <p><strong>Hansefraktion Rostock</strong><br/>Neuer Markt 1, 18055 Rostock</p>
                        <p><strong>Vertreten durch:</strong><br/>Lajos Orban (Fraktionsvorsitzender)</p>
                        <p><strong>Kontakt:</strong><br/>Telefon: 0381 / 381 - 1234<br/>E-Mail: info@hansefraktion-rostock.de</p>
                    </div>
                    <button onClick={() => setView('home')} className="mt-12 text-[#e33e2b] font-bold underline uppercase tracking-widest text-xs">Zurück zur Startseite</button>
                </div>
            );

            const renderDatenschutz = () => (
                <div className="pt-40 pb-24 max-w-4xl mx-auto px-4 font-serif text-left">
                    <h1 className="text-4xl font-bold text-[#0056b3] mb-8 italic">Datenschutzerklärung</h1>
                    <div className="space-y-6 text-gray-700 font-sans leading-relaxed text-sm">
                        <h2 className="font-bold text-[#e33e2b]">Datenschutz auf einen Blick</h2>
                        <p>Wir behandeln Ihre personenbezogenen Daten vertraulich und entsprechend der gesetzlichen Datenschutzvorschriften sowie dieser Datenschutzerklärung.</p>
                        <p>Wenn Sie unser Kontaktformular nutzen, werden Ihre Angaben (Name, E-Mail, Inhalt) ausschließlich zur Bearbeitung Ihres Anliegens in unserer gesicherten Firebase-Datenbank gespeichert und nicht an Dritte weitergegeben.</p>
                    </div>
                    <button onClick={() => setView('home')} className="mt-12 text-[#e33e2b] font-bold underline uppercase tracking-widest text-xs">Zurück zur Startseite</button>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    <div>
                        {renderNavigation()}
                        {view === 'home' && renderHomeView()}
                        {view === 'archiv' && renderArchivView()}
                        {view === 'admin' && renderAdminView()}
                        {view === 'impressum' && renderImpressum()}
                        {view === 'datenschutz' && renderDatenschutz()}
                    </div>

                    <footer className="bg-gray-900 text-gray-500 py-20 text-center border-t border-gray-800">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex justify-center gap-10 text-[10px] font-bold uppercase tracking-[0.3em] mb-12">
                                <button onClick={() => setView('impressum')} className="hover:text-white transition-colors">Impressum</button>
                                <button onClick={() => setView('datenschutz')} className="hover:text-white transition-colors">Datenschutz</button>
                                <button onClick={() => setView('admin')} className="hover:text-white transition-colors">Verwaltung (Intern)</button>
                            </div>
                            <p className="opacity-40 italic tracking-widest text-[8px] uppercase">Hansefraktion Rostock © 2024 | Vernünftig. Sozial. Verantwortungsbewusst.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
